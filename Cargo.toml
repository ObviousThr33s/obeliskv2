[package]
name = "obelisk"
version = "0.3.0"
edition = "2021"

[dependencies]
crossterm = "0.27"

# Engineering standard — see STYLE.md for the rationale and the Shall/Will/Should
# tiers. Almost everything sits at `warn` (the build stays green) and ratchets to
# `deny` as the code is cleaned. Clippy lints fire under `cargo clippy`.
[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
indexing_slicing = "warn"
cast_possible_truncation = "warn"
cast_sign_loss = "warn"
cast_precision_loss = "warn"
needless_pass_by_value = "warn"
inefficient_to_string = "warn"
